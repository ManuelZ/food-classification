n_trials: 20
max_epochs: 5
search_space:
  lr:
    type: float
    low: 1.0e-6
    high: 1.0e-2
    log: true
  weight_decay:
    type: float
    low: 1.0e-6
    high: 1.0e-2
    log: true
  batch_size:
    type: categorical
    choices: [64, 128, 256, 384]
  model_name:
    type: categorical
    choices:
      - resnet18
      - resnet34
      - resnet50
      - convnext_tiny
      - convnext_small
      - efficientnet_b0
      - mobilenet_v3_large
      - shufflenet_v2_x1_0
